# ==============================================================
# Inkwell Platform - Kubernetes Manifest (Single File)
# Target: AWS EKS
# Includes: Namespace, Secret, MongoDB (PVC), Backend, Frontend
# ==============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: inkwell
  labels:
    app.kubernetes.io/part-of: inkwell

---
# Update these values before deploying to production.
apiVersion: v1
kind: Secret
metadata:
  name: inkwell-secrets
  namespace: inkwell
  labels:
    app.kubernetes.io/part-of: inkwell
type: Opaque
stringData:
  # Internal Mongo service DNS (from manifest below)
  MONGO_URI: "mongodb://inkwell-mongodb:27017/inkwell_db"
  # Replace with a long random string
  JWT_SECRET: "replace-with-a-long-random-secret"
  # Optional: leave empty to disable AI features
  OPENAI_API_KEY: ""
  # Optional: comma-separated allowed frontend origins.
  # Leave empty to allow all browser origins.
  FRONTEND_URL: ""

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: inkwell-mongodb-pvc
  namespace: inkwell
  labels:
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inkwell-mongodb
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-mongodb
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: inkwell-mongodb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inkwell-mongodb
        app.kubernetes.io/part-of: inkwell
        app.kubernetes.io/component: database
    spec:
      automountServiceAccountToken: false
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
              protocol: TCP
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: inkwell-mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: inkwell-mongodb
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-mongodb
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inkwell-mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inkwell-backend
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-backend
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inkwell-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inkwell-backend
        app.kubernetes.io/part-of: inkwell
        app.kubernetes.io/component: backend
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z inkwell-mongodb 27017; do
                echo "Waiting for MongoDB..."
                sleep 3
              done
      containers:
        - name: backend
          image: <aws_account_id>.dkr.ecr.<region>.amazonaws.com/inkwell-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: inkwell-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inkwell-secrets
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inkwell-secrets
                  key: OPENAI_API_KEY
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: inkwell-secrets
                  key: FRONTEND_URL
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: inkwell-backend
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-backend
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inkwell-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inkwell-frontend
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-frontend
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inkwell-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inkwell-frontend
        app.kubernetes.io/part-of: inkwell
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: <aws_account_id>.dkr.ecr.<region>.amazonaws.com/inkwell-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: inkwell-frontend
  namespace: inkwell
  labels:
    app.kubernetes.io/name: inkwell-frontend
    app.kubernetes.io/part-of: inkwell
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inkwell-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
