apiVersion: apps/v1
kind: Deployment
metadata:
  name: inkwell-frontend
  namespace: inkwell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inkwell-frontend
  template:
    metadata:
      labels:
        app: inkwell-frontend
    spec:
      containers:
      - name: frontend
        image: <aws_account_id>.dkr.ecr.<region>.amazonaws.com/inkwell-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
