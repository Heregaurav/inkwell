apiVersion: apps/v1
kind: Deployment
metadata:
  name: inkwell-backend
  namespace: inkwell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inkwell-backend
  template:
    metadata:
      labels:
        app: inkwell-backend
    spec:
      containers:
      - name: backend
        image: <aws_account_id>.dkr.ecr.<region>.amazonaws.com/inkwell-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5000"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: inkwell-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: inkwell-secrets
              key: JWT_SECRET
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: inkwell-secrets
              key: OPENAI_API_KEY
        - name: FRONTEND_URL
          valueFrom:
            secretKeyRef:
              name: inkwell-secrets
              key: FRONTEND_URL
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
